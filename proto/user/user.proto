syntax ="proto3";


package user;


option go_package ="github.com/pbuser/genproto/user";   //需要和


import "common/common.proto";
import "api/annotations.proto";





service UserService{
  rpc CreateUser(common.CreateUserRequest)returns(common.CreateUserResponse){
    option(google.api.http)={
      post:"/v1/user/create"
      body:"*"
    };
  }

  rpc GetUserInfo(common.GetUserInfoRequest)returns(common.GetUserResponse){
    option(google.api.http)={
      post: "/v1/user/info"
      body: "*"
    };
  }
}





service StreamService{
  rpc ListValue(common.SimpleRequest)returns(stream common.StreamResponse){};
}


service StreamClient{
  rpc Upload(stream common.StreamRequest)returns(common.SimpleResponse){};
}



service Stream{
  rpc Conversations(stream common.StreamReq)returns(stream common.StreamResp){};
}



service Good{
  rpc CreateGood(common.CreateGoodReq)returns(common.CreateGoodResp){};
}







